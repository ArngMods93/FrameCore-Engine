name: FrameCoreEngine Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build + Release Windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # =========================
      # CHECKOUT REPO
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # SETUP HAXE
      # =========================
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      # =========================
      # CACHE HAXELIB
      # =========================
      - name: Cache haxelib
        uses: actions/cache@v4
        with:
          path: C:\haxelib
          key: haxelib-${{ runner.os }}

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        shell: cmd
        run: |
          haxelib setup C:\haxelib
          haxelib install lime -always
          haxelib install openfl -always
          haxelib install flixel -always
          haxelib install flixel-tools -always
          haxelib install hxcpp -always
          haxelib run lime setup -y

      # =========================
      # OPTIONAL SETUP SCRIPT
      # =========================
      - name: Setup project scripts
        shell: cmd
        run: |
          if exist setup\windows.bat call setup\windows.bat

      # =========================
      # BUILD GAME
      # =========================
      - name: Build game
        shell: cmd
        run: haxelib run lime build windows -release -D officialBuild

      # =========================
      # VERIFY GENERATED ASSETS
      # =========================
      - name: Verify generated assets
        shell: pwsh
        run: |
          $assets = "export/release/windows/bin/assets"

          if (!(Test-Path $assets)) {
            Write-Host "ERROR: Assets folder not found!"
            exit 1
          }

          Write-Host ""
          Write-Host "========================"
          Write-Host "GENERATED ASSETS"
          Write-Host "========================"

          Get-ChildItem $assets

          Write-Host ""
          Write-Host "Checking important folders..."

          foreach ($folder in @(
            "base_game",
            "week_assets",
            "images",
            "weeks",
            "songs",
            "shared",
            "videos",
            "fonts",
            "data",
            "music"
          )) {
            if (Test-Path "$assets/$folder") {
              Write-Host "[OK] $folder"
            } else {
              Write-Host "[MISSING] $folder"
            }
          }

      # =========================
      # ZIP BUILD (SAFE CHECK)
      # =========================
      - name: Zip build
        shell: pwsh
        run: |
          $path = "export/release/windows/bin"

          if (!(Test-Path $path)) {
            echo "Build folder not found!"
            dir export/release/windows
            exit 1
          }

          Compress-Archive -Path "$path/*" -DestinationPath FrameCoreEngine-Windows.zip

      # =========================
      # CREATE RELEASE
      # =========================
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: FrameCoreEngine-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # NOTIFY DISCORD
      # =========================
      - name: Notify Discord
        if: success()
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $releaseUrl = "https://github.com/$repo/releases/tag/$tag"

          $body = @{
            username = "FrameCore Engine"
            embeds = @(
              @{
                title = "Nueva release: $tag"
                url = $releaseUrl
                description = "Ya está disponible una nueva versión de FrameCore Engine. Mirá el changelog completo en el link."
                color = 5814783
              }
            )
          } | ConvertTo-Json -Depth 5

          Invoke-RestMethod -Uri "${{ secrets.DISCORD_WEBHOOK }}" -Method Post -Body $body -ContentType "application/json"
